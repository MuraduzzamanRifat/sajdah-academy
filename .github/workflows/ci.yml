name: CI

# Catches the build failures we hit live (missing deps, type errors,
# broken imports) BEFORE Vercel attempts the deploy.  3 deploys failed
# during early Supabase setup because @supabase/ssr was missing from
# package.json — this workflow would have caught it in 60 seconds.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run per ref; cancel previous runs on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      # Placeholder values so `next build` can resolve env reads at
      # build time. Real Supabase calls don't run during build (every
      # data-fetching page is `force-dynamic` or revalidate-based).
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
      NEXT_PUBLIC_SITE_URL: https://sijdahacademy.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke-check critical files exist
        run: |
          test -f .next/BUILD_ID
          test -d .next/server/app
          test -f middleware.ts
          test -f supabase/migrations/0001_initial_schema.sql
          test -f supabase/migrations/0002_seed_data.sql
          test -f supabase/migrations/0003_default_settings.sql
          test -f supabase/migrations/0004_security_and_capacity.sql
          test -f supabase/migrations/0005_enrollment_flow_and_views.sql
          echo "✓ All build artifacts present"

  # Optional: type-drift check. Runs only when the SUPABASE_ACCESS_TOKEN
  # secret is configured AND on push to main. Regenerates types from
  # the live DB and fails if they differ from what's checked in —
  # forces lib/supabase/database.types.ts to stay in sync with schema.
  type-drift:
    name: Supabase type-drift check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping type-drift check."
            exit 0
          fi
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Regenerate types
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then exit 0; fi
          supabase gen types typescript --linked > lib/supabase/database.types.fresh.ts

      - name: Compare against checked-in types
        run: |
          if [ ! -f lib/supabase/database.types.fresh.ts ]; then exit 0; fi
          diff -u lib/supabase/database.types.ts lib/supabase/database.types.fresh.ts || {
            echo "::error::lib/supabase/database.types.ts is stale. Run 'npm run db:types' locally and commit."
            exit 1
          }
